<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — AIPL High Bay Lighting</title>
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="login.css" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm" autocomplete="off">
      <div class="login-brand">
        <span class="light-icon">💡</span>
        <span class="brand-title">High Bay Lighting</span>
      </div>
      <p class="login-sub">Sign in to continue</p>

      <label class="login-label" for="email">Email</label>
      <input class="login-input" type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="username" />

      <label class="login-label" for="password">Password</label>
      <div class="login-pw-row">
        <input class="login-input" type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        <button type="button" class="login-pw-toggle" id="pwToggle" aria-label="Show password">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <p class="login-error" id="loginError" role="alert"></p>

      <button type="submit" class="login-submit" id="loginSubmit">Sign in</button>
    </form>
  </div>
  <script src="login.js"></script>
</body>
</html>
