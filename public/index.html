<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>High Bay Lighting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<script>
  // Auth guard -- runs before the page paints. If the login flag isn't
  // set, bounce to login.html immediately so the control page never
  // flashes on screen for a signed-out visitor.
  if (localStorage.getItem('aipl-auth') !== 'true') {
    window.location.replace('login.html');
  }
</script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-title">High Bay Lighting</span>
      <span class="brand-sub">New Building</span>
    </div>
    <span class="mqtt-pill">
      <span class="dot" id="mqttDot"></span>
      <span id="mqttText">connecting…</span>
    </span>

    <div class="actions">
      <button class="btn" id="allOffBtn">All off</button>
      <button class="btn primary" id="allOnBtn">All on</button>
      <button class="icon-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="themeIconSun" viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg id="themeIconMoon" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button class="icon-btn" id="logoutBtn" title="Log out" aria-label="Log out">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="summary">
    <div class="stat accent">
      <div class="stat-num" id="statOnCount">0/0</div>
      <div class="stat-label">Lights on</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statRowCount">0</div>
      <div class="stat-label">Rows</div>
    </div>
    <div class="stat warn">
      <div class="stat-num" id="statOfflineCount">0</div>
      <div class="stat-label">Offline devices</div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="swatch on"></span> Light is ON</span>
    <span class="legend-item"><span class="swatch off"></span> Light is OFF</span>
    <span class="legend-item"><span class="badge-sample"></span> Offline — no recent signal from this device (last known state shown, may be stale)</span>
  </div>

  <main id="rowsContainer" class="rows-container"></main>
  <script src="app.js"></script>
</body>
</html>
